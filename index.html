<!-- Cesium base URL must be set BEFORE the library loads so its workers,

<script>

  //    upgrade from free satellite imagery to Google Photorealistic 3D Tiles

  const CESIUM_VERSION = "1.143.0";

    "https://cdn.jsdelivr.net/npm/cesium@" + CESIUM_VERSION + "/Build/Cesium/";

  #intro > * { position: relative; z-index: 1; }

  .ziprow { display: flex; gap: 10px; align-items: center; }

  /* Quote + controls treatment for the payoff */

<script>
(function () {
  "use strict";

  // ---- Copy ----------------------------------------------------------------
  // A single line, shown in deep space once Earth has slipped away.
  const QUOTES_OUT = [
    { t: "Whatever you're carrying, you can set it down for a minute.", a: "" },
  ];
  const pickQuote = (arr) => arr[Math.floor(Math.random() * arr.length)];
  function setQuote(textId, attrId, arr) {
    const q = pickQuote(arr);
    el(textId).textContent = q.t;
    el(attrId).textContent = q.a ? "— " + q.a : "";
  }

  // ---- Flight tuning -------------------------------------------------------
  // R_START is town-scale, not rooftop: free satellite imagery is blurry that
  // low, and starting deeper needs cold high-zoom tiles that flash a void
  // before they load. (The Google 3D upgrade can start much lower.) Going
  // OUTWARD from here only ever needs coarser tiles, which are already loaded —
  // so once the opening frame is preloaded, the whole pull-back stays clean.
  const R_START = 7000;        // meters from your spot (~7 km straight-down, town scale)
  const R_END   = 1.2e10;      // meters — deep space: Earth passes through marble →
                               // pale blue dot → speck → gone, leaving only stars
  // Start looking straight DOWN at your town (loads fast, "there you are"), then
  // tilt to oblique as you rise so the horizon and curvature reveal themselves.
  // An oblique low-altitude start needs a tile-storm that renders black while it
  // loads; top-down avoids it entirely.
  const PITCH_START = -88;     // deg: near top-down on your location
  const PITCH_END   = -55;     // deg: oblique — the planet as a sphere in space
  const HEAD_START = 0, HEAD_END = 14;  // subtle drift for life
  // Longer than a marble-only pull-back: the span is now ~6 orders of magnitude,
  // so more seconds keep the felt zoom speed gentle and the recession unhurried.
  let OUT_SECONDS = 40;         // let: nudged slightly shorter when the OS asks for reduced motion
  const EARTH_GONE_RANGE = 6.5e9; // camera range where Earth reads as gone (~2 px speck)
  const QUOTE_DELAY = 2000;     // ms after Earth vanishes before the quote fades in

  const delay = (ms) => new Promise((r) => setTimeout(r, ms));
  // Resolve once your location has ACTUALLY rendered (center pixel is no longer
  // black). scene.globe.tilesLoaded flickers true before tiles even request, so
  // it can't gate the reveal — the rendered pixel is the honest signal.
  function waitForRendered(maxMs) {
    return new Promise((resolve) => {
      const c = scene.canvas;
      const gl = c.getContext("webgl2") || c.getContext("webgl");
      const buf = new Uint8Array(4);
      const t0 = performance.now();
      (function poll() {
        let lit = false;
        try {
          gl.readPixels(c.width >> 1, c.height >> 1, 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, buf);
          lit = buf[0] + buf[1] + buf[2] > 40; // ground drawn, not black
        } catch (e) { /* context race — try again next poll */ }
        if (lit || performance.now() - t0 > maxMs) resolve();
        else setTimeout(poll, 120);
      })();
    });
  }

  // ---- State ---------------------------------------------------------------
  let viewer, scene, target = null, rafId = null, googleMode = false;
  let starPoints = null, lastStarO = -1; // parallax near-star field + its last opacity
  const el = (id) => document.getElementById(id);

  // ---- Cesium init ---------------------------------------------------------
  // NOTE: In Cesium 1.143 a `baseLayer:` built from ImageryLayer.fromProviderAsync
  // at construction time never resolves — the globe's base imagery stays pending
  // and the globe geometry never draws. Use baseLayer:false, then add the layer.
  //
  // Imagery: EOX Sentinel-2 cloudless (a keyless, CORS-enabled, CC BY 4.0 global
  // cloudless mosaic) — properly licensed for a public app, unlike the keyless
  // Esri endpoint. Beautiful for the pull-back; softer than Esri at street level,
  // which is what the optional Google 3D tier is for.
  function addSatelliteImagery() {
    viewer.imageryLayers.addImageryProvider(
      new Cesium.UrlTemplateImageryProvider({
        url: "https://tiles.maps.eox.at/wmts/1.0.0/s2cloudless-2020_3857/default/GoogleMapsCompatible/{z}/{y}/{x}.jpg",
        maximumLevel: 15,
        credit: "Sentinel-2 cloudless (2020) © EOX IT Services — modified Copernicus data",
      })
    );
  }

  async function initViewer() {
    Cesium.Ion.defaultAccessToken = ""; // never call Cesium Ion
    viewer = new Cesium.Viewer("cesiumContainer", {
      baseLayer: false,
      contextOptions: { webgl: { preserveDrawingBuffer: true } }, // reliable screenshots
      baseLayerPicker: false, geocoder: false, homeButton: false,
      sceneModePicker: false, navigationHelpButton: false, animation: false,
      timeline: false, fullscreenButton: false, infoBox: false,
      selectionIndicator: false, requestRenderMode: false,
    });
    scene = viewer.scene;
    scene.skyAtmosphere.show = true;
    scene.globe.showGroundAtmosphere = true;
    scene.globe.enableLighting = false;   // whole Earth lit — your spot never in shadow
    scene.sun.show = false;               // no harsh sun sprite; calm starfield
    scene.moon.show = false;
    scene.fog.enabled = false;            // crisper low-altitude view
    scene.screenSpaceCameraController.enableInputs = false; // guided, no dragging

    // Real Milky Way skybox (ESO / S. Brunier panorama → cube faces via build_sky.py)
    scene.skyBox = new Cesium.SkyBox({
      sources: {
        positiveX: "sky/px.jpg", negativeX: "sky/nx.jpg",
        positiveY: "sky/py.jpg", negativeY: "sky/ny.jpg",
        positiveZ: "sky/pz.jpg", negativeZ: "sky/nz.jpg",
      },
    });
    try { // CC BY 4.0 attribution for the Milky Way panorama (shows in Cesium's credit lightbox)
      viewer.creditDisplay.addStaticCredit(
        new Cesium.Credit("Milky Way: ESO/S. Brunier · CC BY 4.0", false));
    } catch (e) { /* older Cesium API — attribution also in README */ }

    addParallaxStars(); // finite-distance stars so the sky recedes with the pull-back

    if (GOOGLE_MAPS_KEY) {
      await enableGoogle3D();
    } else {
      addSatelliteImagery();
    }
  }

  async function enableGoogle3D() {
    try {
      scene.globe.show = false; // let the 3D tiles be the Earth surface
      const tileset = await Cesium.createGooglePhotorealistic3DTileset({ key: GOOGLE_MAPS_KEY });
      scene.primitives.add(tileset);
      googleMode = true;
    } catch (e) {
      console.warn("Google 3D Tiles unavailable — falling back to free imagery.", e);
      scene.globe.show = true;
      addSatelliteImagery();
      googleMode = false;
    }
  }

  // ---- Parallax star field -------------------------------------------------
  // The Milky Way skybox sits at infinity, so pulling the camera back doesn't move
  // it — Earth shrinks against a frozen sky. Fix: scatter a few hundred stars at
  // FINITE distances around Earth. Because they're near, they show real parallax —
  // converging toward Earth and shrinking as you recede — so the whole scene reads
  // as one continuous pull-back through space. They fade in only once you're well
  // into space (kept off the low-altitude opening) and depth-test against Earth so
  // ones behind it are correctly hidden.
  function addParallaxStars() {
    const coll = scene.primitives.add(new Cesium.PointPrimitiveCollection());
    const N = 480;
    let s = 987654321; // seeded PRNG so the field is identical every run
    const rnd = () => { s = (s * 1103515245 + 12345) & 0x7fffffff; return s / 0x7fffffff; };
    const pts = [], base = [];
    for (let i = 0; i < N; i++) {
      const u = rnd() * 2 - 1, th = rnd() * Math.PI * 2, r = Math.sqrt(1 - u * u);
      const dir = new Cesium.Cartesian3(r * Math.cos(th), r * Math.sin(th), u);
      const d = 3e7 * Math.pow(100, rnd()); // 3e7..3e9 m from Earth center, log-spread
      const pos = Cesium.Cartesian3.multiplyByScalar(dir, d, new Cesium.Cartesian3());
      pts.push(coll.add({
        position: pos,
        color: Cesium.Color.WHITE.withAlpha(0),
        pixelSize: 1 + rnd() * 2.2,
        scaleByDistance: new Cesium.NearFarScalar(1e8, 1.8, 8e9, 0.25),
      }));
      base.push(0.55 + rnd() * 0.45); // per-star brightness
    }
    starPoints = { pts, base };
  }

  // Fade the near-stars in across camera range ~1.2e7 → 1.2e8 m, then hold. Only
  // touches the points while the opacity is actually changing (cheap).
  function setStarOpacity(range) {
    if (!starPoints) return;
    const o = Math.min(1, Math.max(0, (range - 1.2e7) / 1.08e8));
    if (Math.abs(o - lastStarO) < 0.01) return;
    lastStarO = o;
    const { pts, base } = starPoints;
    for (let i = 0; i < pts.length; i++) pts[i].color = new Cesium.Color(1, 1, 1, base[i] * o);
  }

  // ---- Ambient pad (Web Audio, no files) -----------------------------------
  // Warm + Hope pad: a low C-major chord (65 Hz root) grounds the mix, lifted by
  // a soft higher major triad (C4·E4·G4) glowing through a brighter lowpass. Two
  // detuned sines per note, gentle breathing, warm convolution reverb — grounding
  // but hopeful, not heavy.
  let audioCtx = null, masterGain = null, muted = false;
  const MASTER_LEVEL = 0.5;

  function makeReverbImpulse(ctx, seconds, decay) {
    const len = Math.floor(ctx.sampleRate * seconds);
    const buf = ctx.createBuffer(2, len, ctx.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay); // decaying noise
      }
    }
    return buf;
  }

  function startDrone() {
    if (audioCtx) { audioCtx.resume(); return; } // resume if returning
    const ctx = (audioCtx = new (window.AudioContext || window.webkitAudioContext)());

    masterGain = ctx.createGain();
    masterGain.gain.value = 0;
    const limiter = ctx.createDynamicsCompressor(); // safety: never clip
    limiter.threshold.value = -8; limiter.ratio.value = 6; limiter.attack.value = 0.02;
    masterGain.connect(limiter).connect(ctx.destination);

    const tone = ctx.createBiquadFilter();          // brighter filter — lets the light through
    tone.type = "lowpass"; tone.frequency.value = 1100; tone.Q.value = 0.3;
    tone.connect(masterGain);

    const reverb = ctx.createConvolver();           // warm space
    reverb.buffer = makeReverbImpulse(ctx, 5.5, 2.6);
    const wet = ctx.createGain(); wet.gain.value = 0.55;
    const dry = ctx.createGain(); dry.gain.value = 0.6;
    reverb.connect(wet).connect(tone);
    dry.connect(tone);
    const bus = ctx.createGain();                   // voices feed both dry + reverb
    bus.connect(dry); bus.connect(reverb);

    // Low C-major chord (C2·G2·C3·E3·G3) grounds; soft high triad (C4·E4·G4) lifts.
    const voices = [];
    [65.41, 98.00, 130.81, 164.81, 196.00].forEach((f, i) => voices.push({ f, g: 0.16 / (i + 1) + 0.04, bi: i }));
    [261.63, 329.63, 392.00].forEach((f, i) => voices.push({ f, g: 0.05 / (i + 1) + 0.02, bi: i + 5 }));
    voices.forEach((v) => {
      const vg = ctx.createGain(); vg.gain.value = v.g;
      vg.connect(bus);
      const lfo = ctx.createOscillator();           // slow, gentle "breathing"
      lfo.frequency.value = 0.03 + v.bi * 0.012;
      const lfoGain = ctx.createGain(); lfoGain.gain.value = v.g * 0.35;
      lfo.connect(lfoGain).connect(vg.gain); lfo.start();
      [-3, 3].forEach((detune) => {                 // two detuned sines per note
        const o = ctx.createOscillator();
        o.type = "sine"; o.frequency.value = v.f; o.detune.value = detune;
        o.connect(vg); o.start();
      });
    });

    masterGain.gain.linearRampToValueAtTime(MASTER_LEVEL, ctx.currentTime + 6); // slow warm bloom
    el("mute").classList.add("show");
  }
  el("mute").addEventListener("click", () => {
    if (!audioCtx) return;
    muted = !muted;
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(muted ? 0 : MASTER_LEVEL, audioCtx.currentTime + 0.8);
    el("mute").textContent = muted ? "♪̷" : "♪";
  });

  // ---- The flight ----------------------------------------------------------
  const easeInOut = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2);

  function fly(opts) {
    cancelAnimationFrame(rafId);
    const logFrom = Math.log(opts.fromR), logTo = Math.log(opts.toR);
    const t0 = performance.now();
    let cued = false;
    (function tick(now) {
      let t = (now - t0) / (opts.seconds * 1000);
      if (t > 1) t = 1;
      const e = easeInOut(t);
      const range = Math.exp(logFrom + (logTo - logFrom) * e); // log = constant felt speed
      const pitch = Cesium.Math.toRadians(opts.fromP + (opts.toP - opts.fromP) * e);
      const head  = Cesium.Math.toRadians(opts.fromH + (opts.toH - opts.fromH) * e);
      viewer.camera.lookAt(target, new Cesium.HeadingPitchRange(head, pitch, range));
      setStarOpacity(range); // fade the parallax stars in as we climb into space
      // Fire the cue the moment Earth is gone — don't wait for the slow eased tail.
      if (!cued && opts.onCue && range >= opts.cueRange) { cued = true; opts.onCue(); }
      if (t < 1) rafId = requestAnimationFrame(tick);
      else if (opts.onDone) opts.onDone();
    })(t0);
  }

  function flyOut(onCue) {
    fly({ fromR: R_START, toR: R_END, fromP: PITCH_START, toP: PITCH_END,
          fromH: HEAD_START, toH: HEAD_END, seconds: OUT_SECONDS,
          cueRange: EARTH_GONE_RANGE, onCue });
  }

  // ---- Overlay helpers -----------------------------------------------------
  function show(id) { el(id).classList.add("show"); }
  function hide(id) { el(id).classList.remove("show"); }

  // ---- Sequence ------------------------------------------------------------
  async function begin(lat, lng) {
    target = Cesium.Cartesian3.fromDegrees(lng, lat, 0);
    // Snap to the start framing while the screen is still black.
    viewer.camera.lookAt(target, new Cesium.HeadingPitchRange(
      Cesium.Math.toRadians(HEAD_START), Cesium.Math.toRadians(PITCH_START), R_START));
    startDrone();
    hide("intro");
    el("about").style.display = "none";
    el("aboutText").classList.remove("show");

    // Preload the opening view so the first frame is your place, never a void.
    await waitForRendered(8000);
    el("fade").style.opacity = "0"; // fade the black away over your location
    await delay(1900);              // hold on your place for a breath
    flyOut(() => {              // onCue: fires when Earth vanishes
      setTimeout(() => {
        setQuote("quote", "quoteAttr", QUOTES_OUT);
        show("payoff");
      }, QUOTE_DELAY);
    });
  }

  function reset() {                  // "New location"
    cancelAnimationFrame(rafId);
    hide("payoff");
    if (starPoints) { // hide the near-stars again for the next run
      starPoints.pts.forEach((p) => (p.color = Cesium.Color.WHITE.withAlpha(0)));
      lastStarO = 0;
    }
    viewer.camera.lookAtTransform(Cesium.Matrix4.IDENTITY); // release the locked frame
    el("fade").style.opacity = "1";
    el("zip").value = "";
    el("about").style.display = "";
    el("geo").textContent = "or use my location";
    setTimeout(() => show("intro"), 400);
    setTimeout(() => el("zip").focus(), 900);
  }

  // ---- Input ---------------------------------------------------------------
  let ready = false;                 // true once Cesium + the globe are initialized
  function showErr(msg) { const e = el("err"); e.textContent = msg; e.classList.add("show"); }

  function submit() {
    if (!ready) return;
    const z = (el("zip").value || "").trim();
    if (!window.ZIPS) {           // the data file never loaded — the real problem
      showErr("ZIP data didn't load. Open this with a local server (see README), not by double-clicking the file.");
      return;
    }
    const hit = window.ZIPS[z];
    if (!/^\d{5}$/.test(z) || !hit) {
      showErr("Couldn't find that ZIP — try another?");
      return;
    }
    el("err").classList.remove("show");
    begin(hit[0], hit[1]);
  }

  function useMyLocation() {
    if (!ready) return;
    if (!navigator.geolocation) { showErr("Location isn't available here — enter a ZIP instead."); return; }
    el("err").classList.remove("show");
    el("geo").textContent = "finding you…";
    navigator.geolocation.getCurrentPosition(
      (pos) => begin(pos.coords.latitude, pos.coords.longitude),
      () => { el("geo").textContent = "or use my location";
        showErr("Couldn't get your location — enter a ZIP instead."); },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
    );
  }

  function shareApp() {
    const url = location.href.split("#")[0];
    if (navigator.share) {
      navigator.share({ title: "Zoom Out", text: "From your ZIP code to the edge of space, and back.", url }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => {
        el("share").textContent = "Link copied";
        setTimeout(() => (el("share").textContent = "Share"), 1800);
      });
    }
  }

  function markReady() {
    ready = true;
    el("go").disabled = false;
    el("geo").disabled = false;
    el("loading").style.display = "none";
  }

  el("go").addEventListener("click", submit);
  el("geo").addEventListener("click", useMyLocation);
  el("share").addEventListener("click", shareApp);
  el("about").addEventListener("click", () => el("aboutText").classList.toggle("show"));
  el("zip").addEventListener("keydown", (ev) => { if (ev.key === "Enter") submit(); });
  el("zip").addEventListener("input", () => {
    el("zip").value = el("zip").value.replace(/\D/g, "").slice(0, 5);
    el("err").classList.remove("show");
  });
  el("again1").addEventListener("click", reset);

  // ---- Boot ----------------------------------------------------------------
  function webglAvailable() {
    try {
      const c = document.createElement("canvas");
      return !!(window.WebGLRenderingContext && (c.getContext("webgl") || c.getContext("experimental-webgl")));
    } catch (e) { return false; }
  }

  window.addEventListener("load", () => {
    if (window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      OUT_SECONDS = 34; // only slightly shorter, so devices stay consistent
    }
    if (!window.Cesium || !webglAvailable()) {
      el("loading").style.display = "none";
      showErr("This experience needs a browser that can render 3D graphics (WebGL) — try a recent Chrome, Safari, Firefox, or Edge.");
      return;
    }
    if (!window.ZIPS) {  // ZIP lookup is dead, but geolocation can still work
      showErr("ZIP data didn't load — run from a local server, or use “use my location.”");
    }
    initViewer().then(markReady).catch((e) => {
      console.error("Globe init failed", e);
      el("loading").style.display = "none";
      showErr("Something went wrong starting the globe. Try reloading.");
    });
    el("zip").focus();
  });
})();
</script>
